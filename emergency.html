<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer - Emergency Features</title>
    <style>
        /* Modern Reset & Typography */
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #0f0c1b; /* Matching Deep Purple */
            color: #f1f1f1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Colourful Gradient Navbar */
        nav {
            background: linear-gradient(135deg, #ff007f, #ff5e00);
            padding: 15px 40px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(255, 0, 127, 0.4);
        }

        nav h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* Core Layout Container */
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            width: 100%;
        }

        /* Action Buttons Wrapper */
        .action-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 35px;
        }

        /* Vibrant Action Buttons */
        button {
            padding: 18px 25px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Distinct Colouring for each tool button */
        button:nth-of-type(1) {
            /* Play Alarm - Alarm Crimson Red */
            background: linear-gradient(135deg, #ff0844 0%, #ff4d6d 100%);
            box-shadow: 0 4px 15px rgba(255, 8, 68, 0.4);
        }

        button:nth-of-type(2) {
            /* Get Live Location - Electric Teal/Blue */
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
            color: #0f0c1b; /* Dark text for better contrast on neon blue */
        }

        button:nth-of-type(3) {
            /* Fake Call - Energetic Orange */
            background: linear-gradient(135deg, #ff5e00 0%, #ff9f43 100%);
            box-shadow: 0 4px 15px rgba(255, 94, 0, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Live Location Feedback Box */
        #location {
            margin-top: -10px;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(0, 242, 254, 0.1);
            border-left: 4px solid #00f2fe;
            border-radius: 4px;
            font-size: 15px;
            color: #00f2fe;
            display: none; /* Hidden by default until JavaScript triggers it */
        }

        /* Stylish Card-Style Directory Grid */
        .contact-card {
            background: #191428;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 127, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        /* Cross-Browser Compatible Gradient Section Title */
        .contact-card h2 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(45deg, #ff007f, #ff5e00);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .contact-card ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-card li {
            background: #221a35;
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        .contact-card li:hover {
            background: #2b2142;
            border-color: rgba(255, 0, 127, 0.3);
        }

        /* Number highlight tag */
        .number-tag {
            background: rgba(255, 0, 127, 0.15);
            color: #ff007f;
            padding: 5px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 18px;
            border: 1px solid rgba(255, 0, 127, 0.3);
        }

        /* Mobile Responsiveness */
        @media(max-width: 480px){
            .container {
                padding: 20px;
                margin: 10px auto;
            }
            
            button {
                padding: 15px 20px;
                font-size: 16px;
            }

            .contact-card li {
                font-size: 16px;
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <h1>Emergency Features</h1>
    </nav>

    <div class="container">
        <div class="action-box">
            <button onclick="playAlarm()">
                🔊 Play Alarm
            </button>

            <button onclick="getLocation()">
                📍 Get Live Location
            </button>

            <button onclick="fakeCall()">
                📞 Fake Call
            </button>
        </div>

        <div id="location"></div>

        <div class="contact-card">
            <h2>Emergency Numbers</h2>

            <ul>
                <li>
                    <span>Police</span> 
                    <span class="number-tag">100</span>
                </li>
                <li>
                    <span>Women Helpline</span> 
                    <span class="number-tag">1091</span>
                </li>
                <li>
                    <span>Ambulance</span> 
                    <span class="number-tag">108</span>
                </li>
            </ul>
        </div>
    </div>

    <audio id="alarmSound" src="sounds/alarm.mp3"></audio>

    <script src="js/script.js"></script>

</body>
</html>
